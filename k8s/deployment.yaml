apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-sprint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlops-sprint
  template:
    metadata:
      labels:
        app: mlops-sprint
    spec:
      containers:
        - name: mlops-sprint
          image: ravalikotha/mlops-sprint:v1
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
